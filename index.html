<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Vancouver & Partners" />
  <title>Vancouver & Partners</title>

  <!-- Luxury editorial-style type. The site still works if Google Fonts is unavailable. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --brand-delay-ms: 40000;
      --brand-white: rgba(204, 207, 211, 0.72);
      --navy-veil: rgba(3, 12, 28, 0.24);
      --navy-deep: #030c1c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--navy-deep);
      overflow: hidden;
    }

    body {
      font-family: "Cormorant Garamond", Didot, "Bodoni 72", Garamond, Georgia, serif;
      color: var(--brand-white);
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      isolation: isolate;
      background:
        linear-gradient(120deg, rgba(5, 18, 38, 0.52), rgba(8, 29, 55, 0.18), rgba(2, 8, 18, 0.48)),
        url("assets/poster.svg") center / cover no-repeat,
        var(--navy-deep);
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: -2;
      background: var(--navy-deep);
    }

    /* A light cinematic veil, not a blurred panel behind the type. */
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 46%, rgba(255, 255, 255, 0.04), transparent 31rem),
        linear-gradient(180deg, rgba(0, 0, 0, 0.03), var(--navy-veil));
    }

    .brand-wrap {
      .brand-wrap {
  position: absolute;
  left: 0;
  right: 0;
  top: 31vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0 2rem;
  opacity: 1;
  transform: none;
  transition: none;
  pointer-events: none;
}

    .brand-wrap.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .brand-title {
      margin: 0;
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.08em;
      color: var(--brand-white);
      font-weight: 300;
      font-size: clamp(2.55rem, 5.3vw, 4.65rem);
      line-height: 0.94;
      letter-spacing: -0.047em;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      text-shadow: none;
      white-space: nowrap;
    }

    .brand-title a {
      color: inherit;
      text-decoration: none;
      pointer-events: auto;
      cursor: pointer;
      outline-offset: 0.16em;
      transition: opacity 180ms ease;
    }

    .brand-title a:hover,
    .brand-title a:focus-visible {
      opacity: 0.76;
    }

    .brand-title span,
    .brand-title a {
      display: inline-block;
    }

    @media (max-width: 640px) {
      .brand-title {
        font-size: clamp(2.15rem, 10.6vw, 3.2rem);
        letter-spacing: -0.055em;
        gap: 0.055em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .brand-wrap {
        transition: none;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Vancouver & Partners landing page">
    <!--
      Replace assets/vancouver-aerial.mp4 with licensed aerial footage.
      Creative direction: start near BC Place, move toward Downtown Vancouver,
      then reveal Stanley Park and Lions Gate Bridge at bright twilight/golden hour.
    -->
    <video
      class="hero-video"
      data-hero-video
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      poster="assets/poster.svg"
      aria-hidden="true"
    >
      <source src="assets/vancouver-aerial.mp4" type="video/mp4" />
    </video>

    <section class="brand-wrap" data-brand aria-label="Vancouver & Partners">
      <h1 class="brand-title">
        <span>Vancouver</span><a href="/" aria-label="Vancouver and Partners home">&amp;</a><span>Partners</span>
      </h1>
    </section>
  </main>

  <script>
    (function () {
      const video = document.querySelector("[data-hero-video]");
      const brand = document.querySelector("[data-brand]");
      const delayMs = 0;
      let revealTimer = null;

      function revealBrand() {
        if (!brand) return;
        brand.classList.add("is-visible");
      }

      function scheduleRevealFromVideoTime() {
        if (!video) {
          revealBrand();
          return;
        }

        const remainingMs = Math.max(0, delayMs - (video.currentTime || 0) * 1000);
        clearTimeout(revealTimer);
        revealTimer = window.setTimeout(revealBrand, remainingMs);
      }

      if (!video) {
        revealBrand();
        return;
      }

      video.addEventListener("playing", scheduleRevealFromVideoTime, { once: true });
      video.addEventListener("timeupdate", function () {
        if (video.currentTime >= delayMs / 1000) revealBrand();
      });

      /* If the video file is missing while you test locally, show the logo anyway. */
      video.addEventListener("error", function () {
        window.setTimeout(revealBrand, 1200);
      });
    })();
  </script>
</body>
</html>
